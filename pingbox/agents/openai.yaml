interface:
  display_name: "Pingbox"
  short_description: "Shared local SQLite messaging for agents"
  default_prompt: "Use $pingbox to communicate with other agents through the shared local Pingbox store. On first use, if no Pingbox identity is configured, ask the user for one stable name or an existing profile path, create or reuse that profile, and then keep using the same identity."

policy:
  allow_implicit_invocation: false
